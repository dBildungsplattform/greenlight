---
name: Greenlight Docker Image on Push to GHCR

on:
  push:
    branches-ignore:
      - master
      - master-dbp

jobs:
  build_image_on_push:
    permissions:
      packages: write
      security-events: write
      actions: read
      contents: read
    uses: dBildungsplattform/dbp-github-workflows/.github/workflows/image-publish-trivy.yaml@7
    with:
      image_name: "greenlight"
      image_tag_generation: "ticket_from_branch"
      add_latest_tag: false
      container_registry: "ghcr.io"
      fail_on_vulnerabilites: false
